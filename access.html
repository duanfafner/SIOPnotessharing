<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIOP Notes Hub Access</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "DM Sans", system-ui, sans-serif;
      background: #f5f4f0;
      color: #1a1a1a;
    }
    .card {
      width: min(420px, 92vw);
      background: #fff;
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.06);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    p {
      margin: 0 0 16px;
      color: #555;
      font-size: 14px;
    }
    .hint {
      background: #eef3ff;
      border: 1px solid #c8d6ff;
      color: #2c3f7a;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.45;
      margin: 0 0 14px;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 11px 12px;
      border-radius: 8px;
      border: 1px solid rgba(0, 0, 0, 0.25);
      font-size: 14px;
      margin-bottom: 12px;
    }
    button {
      width: 100%;
      padding: 11px 12px;
      border: 0;
      border-radius: 8px;
      background: #1a1a1a;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    .error {
      margin-top: 10px;
      font-size: 13px;
      color: #a32d2d;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Protected Access</h1>
    <p>Please enter the SIOP community password to continue.</p>
    <div class="hint">
      Need the password? Open the SIOP App -> Community -> search <strong>"Notes Sharing Tool"</strong>.
    </div>
    <form id="login-form">
      <input id="password" type="password" placeholder="Enter password" required />
      <button id="submit-btn" type="submit">Enter site</button>
    </form>
    <div id="error" class="error"></div>
  </div>

  <script>
    const hasClientAccess = document.cookie.split(';').some((c) => c.trim().startsWith('siop_access_client=1'));
    const params = new URLSearchParams(window.location.search);
    const nextPath = params.get('next') || '/';
    if (hasClientAccess) {
      window.location.href = nextPath;
    }
    if (params.get('error') === 'not_configured') {
      document.getElementById('error').textContent = 'Site password is not configured yet. Contact organizer.';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const error = document.getElementById('error');
      const password = document.getElementById('password').value;
      btn.disabled = true;
      btn.textContent = 'Checking...';
      error.textContent = '';

      try {
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          error.textContent = data.error || 'Unable to sign in.';
          return;
        }
        window.location.href = nextPath;
      } catch {
        error.textContent = 'Network error. Please try again.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Enter site';
      }
    });
  </script>
</body>
</html>
